name: Full Multi-Cloud Deploy

permissions:
  id-token: write
  contents: read

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Welche Cloud deployen?'
        required: true
        default: 'both'
        type: choice
        options:
          - aws
          - gcp
          - both

jobs:
  # ─────────────────────────────────────────
  # TERRAFORM GCP
  # ─────────────────────────────────────────
  terraform-gcp:
    name: Terraform GCP
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.provider == 'gcp' ||
      github.event.inputs.provider == 'both'
    outputs:
      cluster_name: ${{ steps.tf-outputs.outputs.cluster_name }}
      gcs_bucket: ${{ steps.tf-outputs.outputs.gcs_bucket }}
      gcp_pods_secondary_range: ${{ steps.tf-outputs.outputs.gcp_pods_secondary_range }}
      wg_public_ip: ${{ steps.tf-outputs.outputs.wg_public_ip }}
      wg_private_ip: ${{ steps.tf-outputs.outputs.wg_private_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init & Apply (GCP)
        working-directory: infra/GCP/Terraform
        run: |
          echo "region = ${{ vars.GCP_REGION }} for GCP"
          terraform init
          terraform apply -auto-approve \
            -var="project_id=${{ secrets.GCP_PROJECT_ID }}" \
            -var="region=${{ vars.GCP_REGION }}" \
            -var="gcp_service_account_email=${{ secrets.GCP_SERVICE_ACCOUNT }}"

      - id: tf-outputs
        name: Get Terraform Outputs
        working-directory: infra/GCP/Terraform
        shell: bash
        run: |
          CLUSTER_NAME="$(terraform output -raw gke_cluster_name | tr -d '\r\n')"
          GCS_BUCKET="$(terraform output -raw gcp_frontend_bucket_name | tr -d '\r\n')"
          GCP_PODS_SECONDARY_RANGE="$(terraform output -raw gke_pods_secondary_range | tr -d '\r\n')"
          WG_PUBLIC_IP="$(terraform output -raw wg_gateway_public_ip | tr -d '\r\n')"
          WG_PRIVATE_IP="$(terraform output -raw wg_gateway_private_ip | tr -d '\r\n')"
          
          echo "cluster_name=$CLUSTER_NAME" >> "$GITHUB_OUTPUT"
          echo "gcs_bucket=$GCS_BUCKET" >> "$GITHUB_OUTPUT"
          echo "gcp_pods_secondary_range=$GCP_PODS_SECONDARY_RANGE" >> "$GITHUB_OUTPUT"
          echo "wg_public_ip=$WG_PUBLIC_IP" >> "$GITHUB_OUTPUT"
          echo "wg_private_ip=$WG_PRIVATE_IP" >> "$GITHUB_OUTPUT"
          
          echo "Resolved cluster_name='$CLUSTER_NAME'"
          echo "Resolved gcs_bucket='$GCS_BUCKET'"
          echo "Resolved gcp_pods_secondary_range='$GCP_PODS_SECONDARY_RANGE'"
          echo "Resolved wg_public_ip='$WG_PUBLIC_IP'"
          echo "Resolved wg_private_ip='$WG_PRIVATE_IP'"
  # ─────────────────────────────────────────
  # TERRAFORM AWS
  # ─────────────────────────────────────────
  terraform-aws:
    name: Terraform AWS
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.provider == 'aws' ||
      github.event.inputs.provider == 'both'
    outputs:
      cluster_name: ${{ steps.tf-outputs.outputs.cluster_name }}
      s3_bucket: ${{ steps.tf-outputs.outputs.s3_bucket }}
      wg_public_ip: ${{ steps.tf-outputs.outputs.wg_public_ip }}
      wg_private_ip: ${{ steps.tf-outputs.outputs.wg_private_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: AWS Auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform Init & Apply (AWS)
        working-directory: infra/AWS/Terraform
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="region=${{ vars.AWS_REGION }}"

      - id: tf-outputs
        name: Get Terraform Outputs
        working-directory: infra/AWS/Terraform
        shell: bash
        run: |
          CLUSTER_NAME="$(terraform output -raw eks_cluster_name | tr -d '\r\n')"
          S3_BUCKET="$(terraform output -raw aws_frontend_bucket_name | tr -d '\r\n')"
          WG_PUBLIC_IP="$(terraform output -raw wg_gateway_public_ip | tr -d '\r\n')"
          WG_PRIVATE_IP="$(terraform output -raw wg_gateway_private_ip | tr -d '\r\n')"

          echo "cluster_name=$CLUSTER_NAME" >> "$GITHUB_OUTPUT"
          echo "s3_bucket=$S3_BUCKET" >> "$GITHUB_OUTPUT"
          echo "wg_public_ip=$WG_PUBLIC_IP" >> "$GITHUB_OUTPUT"
          echo "wg_private_ip=$WG_PRIVATE_IP" >> "$GITHUB_OUTPUT"

          echo "Resolved cluster_name='$CLUSTER_NAME'"
          echo "Resolved s3_bucket='$S3_BUCKET'"
          echo "Resolved wg_public_ip='$WG_PUBLIC_IP'"
          echo "Resolved wg_private_ip='$WG_PRIVATE_IP'"


  configure-wireguard-gateways:
    name: Configure WireGuard Gateways
    runs-on: ubuntu-latest
    needs:
      - terraform-gcp
      - terraform-aws
    if: >
      needs.terraform-gcp.result == 'success' &&
      needs.terraform-aws.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Prepare AWS SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ vars.AWS_WG_SSH_PRIVATE_KEY }}" > ~/.ssh/aws_wg_key
          chmod 600 ~/.ssh/aws_wg_key

      - name: Configure AWS WireGuard gateway
        shell: bash
        env:
          AWS_WG_PUBLIC_IP: ${{ needs.terraform-aws.outputs.wg_public_ip }}
          GCP_WG_PUBLIC_IP: ${{ needs.terraform-gcp.outputs.wg_public_ip }}
          GCP_PODS_SECONDARY_RANGE: ${{ needs.terraform-gcp.outputs.gcp_pods_secondary_range }}
          AWS_WG_PRIVATE_KEY: ${{ vars.AWS_WG_PRIVATE_KEY }}
          GCP_WG_PUBLIC_KEY: ${{ vars.GCP_WG_PUBLIC_KEY }}
        run: |
          cat > aws-wg-setup.sh <<EOF
          sudo apt-get update
          sudo apt-get install -y wireguard

          sudo tee /etc/wireguard/wg0.conf > /dev/null <<WGCONF
          [Interface]
          Address = 10.255.0.1/30
          ListenPort = 51820
          PrivateKey = ${AWS_WG_PRIVATE_KEY}
          PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT
          PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT

          [Peer]
          PublicKey = ${GCP_WG_PUBLIC_KEY}
          AllowedIPs = 10.255.0.2/32, 10.20.0.0/16, ${GCP_PODS_SECONDARY_RANGE}
          Endpoint = ${GCP_WG_PUBLIC_IP}:51820
          PersistentKeepalive = 25
          WGCONF

          sudo chmod 600 /etc/wireguard/wg0.conf
          echo 'net.ipv4.ip_forward=1' | sudo tee /etc/sysctl.d/99-wireguard.conf > /dev/null
          sudo sysctl --system
          sudo systemctl enable wg-quick@wg0
          sudo systemctl restart wg-quick@wg0
          sudo wg show
          EOF

          ssh -o StrictHostKeyChecking=no -i ~/.ssh/aws_wg_key ubuntu@"$AWS_WG_PUBLIC_IP" 'bash -s' < aws-wg-setup.sh

      - name: Configure GCP WireGuard gateway
        shell: bash
        env:
          AWS_WG_PUBLIC_IP: ${{ needs.terraform-aws.outputs.wg_public_ip }}
          GCP_WG_PRIVATE_KEY: ${{ vars.GCP_WG_PRIVATE_KEY }}
          AWS_WG_PUBLIC_KEY: ${{ vars.AWS_WG_PUBLIC_KEY }}
          GCP_ZONE: ${{ vars.GCP_REGION }}-c
        run: |
          cat > gcp-wg-setup.sh <<EOF
          sudo apt-get update
          sudo apt-get install -y wireguard

          sudo tee /etc/wireguard/wg0.conf > /dev/null <<WGCONF
          [Interface]
          Address = 10.255.0.2/30
          ListenPort = 51820
          PrivateKey = ${GCP_WG_PRIVATE_KEY}
          PostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -A FORWARD -o wg0 -j ACCEPT
          PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -D FORWARD -o wg0 -j ACCEPT

          [Peer]
          PublicKey = ${AWS_WG_PUBLIC_KEY}
          AllowedIPs = 10.255.0.1/32, 10.0.0.0/16
          Endpoint = ${AWS_WG_PUBLIC_IP}:51820
          PersistentKeepalive = 25
          WGCONF

          sudo chmod 600 /etc/wireguard/wg0.conf
          echo 'net.ipv4.ip_forward=1' | sudo tee /etc/sysctl.d/99-wireguard.conf > /dev/null
          sudo sysctl --system
          sudo systemctl enable wg-quick@wg0
          sudo systemctl restart wg-quick@wg0
          sudo wg show
          EOF

          gcloud compute scp gcp-wg-setup.sh wireguard-gateway:/tmp/gcp-wg-setup.sh \
            --zone="$GCP_ZONE" \
            --ssh-flag="-o StrictHostKeyChecking=no"

          gcloud compute ssh wireguard-gateway \
            --zone="$GCP_ZONE" \
            --ssh-flag="-o StrictHostKeyChecking=no" \
            --command="bash /tmp/gcp-wg-setup.sh"

  
  # ─────────────────────────────────────────
  # DEPLOY GCP (K8s + Frontend)
  # ─────────────────────────────────────────
  deploy-gcp:
    name: Deploy → GKE + GCS
    needs: 
      - terraform-gcp
      - configure-wireguard-gateways
    runs-on: ubuntu-latest
    if: >
      needs.terraform-gcp.result == 'success'
    outputs:
      cockroach_node_ip: ${{ steps.gcp-node-ip.outputs.node_ip }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      
      - name: Debug GKE values
        run: |
          echo "cluster_name='${{ needs.terraform-gcp.outputs.cluster_name }}'"
      
      - name: Fail fast if GKE outputs are missing
        run: |
          if [ -z "${{ needs.terraform-gcp.outputs.cluster_name }}" ]; then
            echo "ERROR: cluster_name is empty"
            exit 1
          fi

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ needs.terraform-gcp.outputs.cluster_name }}
          location: ${{ vars.GCP_REGION }}

      - name: Build & Push Image → Artifact Registry
        run: |
          gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
          IMAGE="europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_AR_REPO }}/backend:${{ github.sha }}"
          docker build -t $IMAGE ./0.0.1/backend
          docker push $IMAGE  
          echo "IMAGE_URL=$IMAGE" >> $GITHUB_ENV

      - name: Deploy namespace + Cockroach external service
        run: |
          kubectl apply -f infra/K8s/namespace.yaml
          kubectl apply -f infra/K8s/cockroachdb-external.yaml

      - name: Get GCP node internal IP
        id: gcp-node-ip
        shell: bash
        run: |
          NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
          if [ -z "$NODE_IP" ]; then
            echo "ERROR: Could not determine GCP node internal IP"
            exit 1
          fi
          echo "node_ip=$NODE_IP" >> "$GITHUB_OUTPUT"
          echo "Resolved GCP node IP: $NODE_IP"
      
      - name: Deploy K8s Manifests
        env:
          ADVERTISE_ADDR: ${{ steps.gcp-node-ip.outputs.node_ip }}:32057
          STORAGE_CLASS: standard-rwo
        run: |
          sed -i "s|BACKEND_IMAGE|${{ env.IMAGE_URL }}|g" infra/K8s/deployment.yaml
          sed -i "s|STORAGE_CLASS|$STORAGE_CLASS|g" infra/K8s/db.yaml
          sed -i "s|ADVERTISE_ADDR_PLACEHOLDER|$ADVERTISE_ADDR|g" infra/K8s/db.yaml
          kubectl apply -f infra/K8s/db.yaml
          kubectl rollout status statefulset/cockroachdb -n idp --timeout=300s
          kubectl apply -f infra/K8s/deployment.yaml
          kubectl apply -f infra/K8s/service.yaml
          kubectl apply -f infra/K8s/ingress.yaml
          kubectl rollout status deployment/idp-backend -n idp --timeout=120s
          kubectl exec -n idp cockroachdb-0 -- ./cockroach sql --insecure -e "SET CLUSTER SETTING kv.rangefeed.enabled = true;"
      
      - name: Get Ingress IP (GCP)
        id: get-ip
        run: |
          for i in {1..18}; do
            IP=$(kubectl get svc -n ingress-nginx ingress-nginx-controller \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null)
            if [ -n "$IP" ]; then
              echo "API_URL=http://$IP" >> $GITHUB_ENV
              echo "GCP Ingress IP: $IP"
              break
            fi
            echo "Warte auf Ingress IP... ($i/18)"
            sleep 10
          done

      - uses: google-github-actions/setup-gcloud@v2

      - name: Build & Deploy Frontend → GCS
        working-directory: 0.0.1/frontend/poc_frontend
        env:
          VITE_API_BASE: ${{ env.API_URL }}
          GCS_BUCKET: ${{ needs.terraform-gcp.outputs.gcs_bucket }}
          VITE_CLOUD_ENV: GCP
        run: |
          npm ci
          npm run build
          gsutil -m rsync -r -d dist/ gs://$GCS_BUCKET/
          gsutil setmeta -h "Cache-Control:no-cache, no-store" \
            gs://$GCS_BUCKET/index.html

  # ─────────────────────────────────────────
  # DEPLOY AWS (K8s + Frontend)
  # ─────────────────────────────────────────
  deploy-aws:
    name: Deploy → EKS + S3
    needs:
      - terraform-aws
      - configure-wireguard-gateways
    runs-on: ubuntu-latest
    if: >
      needs.terraform-aws.result == 'success'
    outputs:
      cockroach_node_ip: ${{ steps.aws-node-ip.outputs.node_ip }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: AWS Auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get EKS Credentials
        run: |
          aws eks update-kubeconfig \
            --name ${{ needs.terraform-aws.outputs.cluster_name }} \
            --region ${{ vars.AWS_REGION }}

      - name: Build & Push Image → ECR
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_URL }}
          IMAGE="${{ secrets.AWS_ECR_URL }}:${{ github.sha }}"
          docker build -t $IMAGE ./0.0.1/backend
          docker push $IMAGE
          echo "IMAGE_URL=$IMAGE" >> $GITHUB_ENV

      - name: Deploy namespace + Cockroach external service
        run: |
          kubectl apply -f infra/K8s/namespace.yaml
          kubectl apply -f infra/K8s/cockroachdb-external.yaml

      - name: Get AWS node internal IP
        id: aws-node-ip
        shell: bash
        run: |
          NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
          if [ -z "$NODE_IP" ]; then
            echo "ERROR: Could not determine AWS node internal IP"
            exit 1
          fi
          echo "node_ip=$NODE_IP" >> "$GITHUB_OUTPUT"
          echo "Resolved AWS node IP: $NODE_IP"

      - name: Apply K8s Manifests
        env:
          ADVERTISE_ADDR: ${{ steps.aws-node-ip.outputs.node_ip }}:32057
          STORAGE_CLASS: gp2
        run: |
          sed -i "s|BACKEND_IMAGE|${{ env.IMAGE_URL }}|g" infra/K8s/deployment.yaml
          sed -i "s|STORAGE_CLASS|$STORAGE_CLASS|g" infra/K8s/db.yaml
          sed -i "s|ADVERTISE_ADDR_PLACEHOLDER|$ADVERTISE_ADDR|g" infra/K8s/db.yaml
          kubectl apply -f infra/K8s/db.yaml
          kubectl rollout status statefulset/cockroachdb -n idp --timeout=300s
          kubectl apply -f infra/K8s/deployment.yaml
          kubectl apply -f infra/K8s/service.yaml
          kubectl apply -f infra/K8s/ingress.yaml
          kubectl rollout status deployment/idp-backend -n idp --timeout=120s
          kubectl exec -n idp cockroachdb-0 -- ./cockroach sql --insecure -e "SET CLUSTER SETTING kv.rangefeed.enabled = true;"

      - name: Get Ingress Hostname (AWS)
        id: get-hostname
        run: |
          for i in {1..18}; do
            HOSTNAME=$(kubectl get svc -n ingress-nginx ingress-nginx-controller \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null)
            if [ -n "$HOSTNAME" ]; then
              echo "API_URL=http://$HOSTNAME" >> $GITHUB_ENV
              echo "AWS Load Balancer: $HOSTNAME"
              break
            fi
            echo "Warte auf Load Balancer Hostname... ($i/18)"
            sleep 10
          done

      - name: Build & Deploy Frontend → S3
        working-directory: 0.0.1/frontend/poc_frontend
        env:
          VITE_API_BASE: ${{ env.API_URL }}
          S3_BUCKET: ${{ needs.terraform-aws.outputs.s3_bucket }}
          VITE_CLOUD_ENV: AWS
        run: |

          npm ci
          npm run build
          aws s3 sync dist/ s3://$S3_BUCKET --delete
          aws s3 cp dist/index.html s3://$S3_BUCKET/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

  setup-replication-gcp:
    name: Setup replication on GCP
    runs-on: ubuntu-latest
    needs: [deploy-gcp, deploy-aws]
    if: >
      always() &&
      needs.deploy-gcp.result == 'success' &&
      needs.deploy-aws.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ vars.GCP_REGION }}

      - name: Configure GCP logical replication stream
        env:
          AWS_COCKROACH_NODE_IP: ${{ needs.deploy-aws.outputs.cockroach_node_ip }}
        run: |
          kubectl exec -n idp cockroachdb-0 -- ./cockroach sql --insecure -d idp -e "CREATE EXTERNAL CONNECTION aws_source AS 'postgresql://root@${AWS_COCKROACH_NODE_IP}:32057/idp?sslmode=disable';"
          kubectl exec -n idp cockroachdb-0 -- ./cockroach sql --insecure -d idp -e "CREATE LOGICAL REPLICATION STREAM FROM TABLES (idp.public.users, idp.public.tokens) ON 'external://aws_source' INTO TABLES (idp.public.users, idp.public.tokens) WITH MODE = 'validated';"

  setup-replication-aws:
    name: Setup replication on AWS
    runs-on: ubuntu-latest
    needs: [deploy-gcp, deploy-aws]
    if: >
      always() &&
      needs.deploy-aws.result == 'success' &&
      needs.deploy-gcp.result == 'success'
    
    steps:
      - uses: actions/checkout@v4

      - name: AWS Auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get EKS Credentials
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ vars.AWS_REGION }}

      - name: Configure AWS logical replication stream
        env:
          GCP_COCKROACH_NODE_IP: ${{ needs.deploy-gcp.outputs.cockroach_node_ip }}
        run: |
          kubectl exec -n idp cockroachdb-0 -- ./cockroach sql --insecure -d idp -e "CREATE EXTERNAL CONNECTION gcp_source AS 'postgresql://root@${GCP_COCKROACH_NODE_IP}:32057/idp?sslmode=disable';"
          kubectl exec -n idp cockroachdb-0 -- ./cockroach sql --insecure -d idp -e "CREATE LOGICAL REPLICATION STREAM FROM TABLES (idp.public.users, idp.public.tokens) ON 'external://gcp_source' INTO TABLES (idp.public.users, idp.public.tokens) WITH MODE = 'validated';"


  