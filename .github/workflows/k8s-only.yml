name: K8s Deploy Only

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Welche Cloud deployen?'
        required: true
        default: 'both'
        type: choice
        options:
          - aws
          - gcp
          - both

jobs:
  # ─────────────────────────────────────────
  # GCP
  # ─────────────────────────────────────────
  deploy-gcp:
    name: Deploy → GKE
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.provider == 'gcp' ||
      github.event.inputs.provider == 'both'
    outputs:
      cockroach_node_ip: ${{ steps.gcp-node-ip.outputs.node_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ vars.GCP_REGION }}

      - name: Build & Push Image → Artifact Registry
        run: |
          gcloud auth configure-docker europe-west1-docker.pkg.dev --quiet
          IMAGE="europe-west1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_AR_REPO }}/backend:${{ github.sha }}"
          docker build -t $IMAGE ./0.0.1/backend
          docker push $IMAGE
          echo "IMAGE_URL=$IMAGE" >> $GITHUB_ENV

      - name: Deploy namespace + Cockroach external service
        run: |
          kubectl apply -f infra/K8s/namespace.yaml
          kubectl apply -f infra/K8s/cockroachdb-external.yaml

      - name: Get GCP node internal IP
        id: gcp-node-ip
        shell: bash
        run: |
          NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
          if [ -z "$NODE_IP" ]; then
            echo "ERROR: Could not determine GCP node internal IP"
            exit 1
          fi
          echo "node_ip=$NODE_IP" >> "$GITHUB_OUTPUT"
          echo "Resolved GCP node IP: $NODE_IP"

      - name: Apply K8s Manifests
        env:
          ADVERTISE_ADDR: ${{ steps.gcp-node-ip.outputs.node_ip }}:32057
          STORAGE_CLASS: standard-rwo
        run: |
          sed -i "s|STORAGE_CLASS|$STORAGE_CLASS|g" infra/K8s/db.yaml
          sed -i "s|ADVERTISE_ADDR_PLACEHOLDER|$ADVERTISE_ADDR|g" infra/K8s/db.yaml
          kubectl apply -f infra/K8s/db.yaml
          kubectl rollout status statefulset/cockroachdb -n idp --timeout=300s
          sed -i "s|BACKEND_IMAGE|${{ env.IMAGE_URL }}|g" infra/K8s/deployment.yaml
          kubectl apply -f infra/K8s/deployment.yaml
          kubectl apply -f infra/K8s/service.yaml
          kubectl apply -f infra/K8s/ingress.yaml
          kubectl rollout status deployment/idp-backend -n idp --timeout=120s
          kubectl exec -n idp cockroachdb-0 -- ./cockroach sql --insecure -e "SET CLUSTER SETTING kv.rangefeed.enabled = true;"

  # ─────────────────────────────────────────
  # AWS
  # ─────────────────────────────────────────
  deploy-aws:
    name: Deploy → EKS
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.provider == 'aws' ||
      github.event.inputs.provider == 'both'
    outputs:
      cockroach_node_ip: ${{ steps.aws-node-ip.outputs.node_ip }}
    steps:
      - uses: actions/checkout@v4

      - name: AWS Auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get EKS Credentials
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ vars.AWS_REGION }}

      - name: Build & Push Image → ECR
        run: |
          aws ecr get-login-password --region ${{ vars.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_URL }}
          IMAGE="${{ secrets.AWS_ECR_URL }}:${{ github.sha }}"
          docker build -t $IMAGE ./0.0.1/backend
          docker push $IMAGE
          echo "IMAGE_URL=$IMAGE" >> $GITHUB_ENV

      - name: Deploy namespace + Cockroach external service
        run: |
          kubectl apply -f infra/K8s/namespace.yaml
          kubectl apply -f infra/K8s/cockroachdb-external.yaml

      - name: Get AWS node internal IP
        id: aws-node-ip
        shell: bash
        run: |
          NODE_IP=$(kubectl get nodes -o jsonpath='{.items[0].status.addresses[?(@.type=="InternalIP")].address}')
          if [ -z "$NODE_IP" ]; then
            echo "ERROR: Could not determine AWS node internal IP"
            exit 1
          fi
          echo "node_ip=$NODE_IP" >> "$GITHUB_OUTPUT"
          echo "Resolved AWS node IP: $NODE_IP"

      - name: Apply K8s Manifests
        env:
          ADVERTISE_ADDR: ${{ steps.aws-node-ip.outputs.node_ip }}:32057
          STORAGE_CLASS: gp2
        run: |
          sed -i "s|STORAGE_CLASS|$STORAGE_CLASS|g" infra/K8s/db.yaml
          sed -i "s|ADVERTISE_ADDR_PLACEHOLDER|$ADVERTISE_ADDR|g" infra/K8s/db.yaml
          kubectl apply -f infra/K8s/db.yaml
          kubectl rollout status statefulset/cockroachdb -n idp --timeout=300s
          sed -i "s|BACKEND_IMAGE|${{ env.IMAGE_URL }}|g" infra/K8s/deployment.yaml
          kubectl apply -f infra/K8s/deployment.yaml
          kubectl apply -f infra/K8s/service.yaml
          kubectl apply -f infra/K8s/ingress.yaml
          kubectl rollout status deployment/idp-backend -n idp --timeout=120s
          kubectl exec -n idp cockroachdb-0 -- ./cockroach sql --insecure -e "SET CLUSTER SETTING kv.rangefeed.enabled = true;"
  
  setup-replication-gcp:
    name: Setup replication on GCP
    runs-on: ubuntu-latest
    needs: [deploy-gcp, deploy-aws]
    if: >
      always() &&
      needs.deploy-gcp.result == 'success' &&
      needs.deploy-aws.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ vars.GCP_REGION }}

      - name: Configure GCP logical replication stream
        env:
          AWS_COCKROACH_NODE_IP: ${{ needs.deploy-aws.outputs.cockroach_node_ip }}
        run: |
          echo "AWS Output = ${{ needs.deploy-aws.outputs.cockroach_node_ip }}"
          echo "GCP Output = ${{ needs.deploy-aws.outputs.cockroach_node_ip }}"
          echo "AWS_COCKROACH_ADDR=$AWS_COCKROACH_NODE_IP"
          kubectl exec -n idp cockroachdb-0 -- ./cockroach sql --insecure -d idp -e "CREATE EXTERNAL CONNECTION aws_source AS 'postgresql://root@${AWS_COCKROACH_NODE_IP}:32057/idp?sslmode=disable';"
          kubectl exec -n idp cockroachdb-0 -- ./cockroach sql --insecure -d idp -e "CREATE LOGICAL REPLICATION STREAM FROM TABLES (idp.public.users, idp.public.tokens) ON 'external://aws_source' INTO TABLES (idp.public.users, idp.public.tokens) WITH MODE = 'validated';"

  setup-replication-aws:
    name: Setup replication on AWS
    runs-on: ubuntu-latest
    needs: [deploy-gcp, deploy-aws]
    if: >
      always() &&
      needs.deploy-aws.result == 'success' &&
      needs.deploy-gcp.result == 'success'
    
    steps:
      - uses: actions/checkout@v4

      - name: AWS Auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Get EKS Credentials
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ vars.AWS_REGION }}

      - name: Configure AWS logical replication stream
        env:
          GCP_COCKROACH_NODE_IP: ${{ needs.deploy-gcp.outputs.cockroach_node_ip }}
        run: |
          echo "GCP_COCKROACH_ADDR=$GCP_COCKROACH_NODE_IP"
          echo "AWS Output = ${{ needs.deploy-aws.outputs.cockroach_node_ip }}"
          echo "GCP Output = ${{ needs.deploy-gcp.outputs.cockroach_node_ip }}"
          kubectl exec -n idp cockroachdb-0 -- ./cockroach sql --insecure -d idp -e "CREATE EXTERNAL CONNECTION gcp_source AS 'postgresql://root@${GCP_COCKROACH_NODE_IP}:32057/idp?sslmode=disable';"
          kubectl exec -n idp cockroachdb-0 -- ./cockroach sql --insecure -d idp -e "CREATE LOGICAL REPLICATION STREAM FROM TABLES (idp.public.users, idp.public.tokens) ON 'external://gcp_source' INTO TABLES (idp.public.users, idp.public.tokens) WITH MODE = 'validated';"

