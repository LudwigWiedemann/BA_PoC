name: K8s Deploy Only

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Welche Cloud deployen?'
        required: true
        default: 'both'
        type: choice
        options:
          - aws
          - gcp
          - both

jobs:
  # ─────────────────────────────────────────
  # GCP
  # ─────────────────────────────────────────
  deploy-gcp:
    name: Deploy → GKE
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.provider == 'gcp' ||
      github.event.inputs.provider == 'both'
    steps:
      - uses: actions/checkout@v4

      - name: GCP Auth (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
          location: ${{ secrets.GCP_REGION }}

      - name: Build & Push Image → Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_AR_REPO }}/backend:${{ github.sha }}"
          docker build -t $IMAGE ./0.0.1/backend
          docker push $IMAGE
          echo "IMAGE_URL=$IMAGE" >> $GITHUB_ENV

      - name: Apply K8s Manifests
        run: |
          sed -i "s|BACKEND_IMAGE|${{ env.IMAGE_URL }}|g" infra/K8s/deployment.yaml
          kubectl apply -f infra/K8s/namespace.yaml
          kubectl apply -f infra/K8s/deployment.yaml
          kubectl apply -f infra/K8s/service.yaml
          kubectl apply -f infra/K8s/ingress.yaml
          kubectl apply -f infra/K8s/db.yaml
          kubectl rollout status deployment/idp-backend --timeout=120s

  # ─────────────────────────────────────────
  # AWS
  # ─────────────────────────────────────────
  deploy-aws:
    name: Deploy → EKS
    runs-on: ubuntu-latest
    if: >
      github.event.inputs.provider == 'aws' ||
      github.event.inputs.provider == 'both'
    steps:
      - uses: actions/checkout@v4

      - name: AWS Auth
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get EKS Credentials
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Build & Push Image → ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_URL }}
          IMAGE="${{ secrets.AWS_ECR_URL }}:${{ github.sha }}"
          docker build -t $IMAGE ./0.0.1/backend
          docker push $IMAGE
          echo "IMAGE_URL=$IMAGE" >> $GITHUB_ENV

      - name: Apply K8s Manifests
        run: |
          sed -i "s|BACKEND_IMAGE|${{ env.IMAGE_URL }}|g" infra/K8s/deployment.yaml
          kubectl apply -f infra/K8s/namespace.yaml
          kubectl apply -f infra/K8s/deployment.yaml
          kubectl apply -f infra/K8s/service.yaml
          kubectl apply -f infra/K8s/ingress.yaml
          kubectl apply -f infra/K8s/db.yaml
          kubectl rollout status deployment/idp-backend --timeout=120s