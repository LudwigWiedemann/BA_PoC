apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: cockroachdb
  namespace: idp
spec:
  serviceName: "cockroachdb"
  replicas: 1
  selector:
    matchLabels:
      app: cockroachdb
  template:
    metadata:
      labels:
        app: cockroachdb
    spec:
      containers:
        - name: cockroachdb
          image: cockroachdb/cockroach:v24.3.29
          command:
            - "/bin/bash"
            - "-ecx"
            - |
              exec cockroach start-single-node --insecure --store=/cockroach/cockroach-data --http-port=8080 --listen-addr=0.0.0.0 --advertise-addr=a6759acd8d0f24f5f95580daf7935735-1284992333.eu-central-1.elb.amazonaws.com
          ports:
            - containerPort: 26257 # SQL
            - containerPort: 8080  # Admin UI
          volumeMounts:
            - name: cockroach-data
              mountPath: /cockroach/cockroach-data
  volumeClaimTemplates:
    - metadata:
        name: cockroach-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: STORAGE_CLASS
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: cockroachdb
  namespace: idp
spec:
  selector:
    app: cockroachdb
  ports:
    - port: 26257
      name: sql
    - port: 8080
      name: http
